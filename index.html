<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devon - SS26</title>
    <!-- Ícono de la pestaña (Favicon) -->
    <link rel="icon" href="https://i.ibb.co/h191t3k2/Devon-Title-logo.png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Jost', 'sans-serif'],
                        serif: ['"Bodoni Moda"', 'serif'],
                    },
                    letterSpacing: {
                        widest: '.2em',
                        wider: '.1em'
                    }
                }
            }
        }
    </script>
    <style>
        /* --- Sincronización Animación (Línea) --- */
        @keyframes slashAnim {
            0%, 20% { width: 0%; opacity: 0; transform: rotate(-45deg) scaleX(0); }
            30%, 70% { width: 145%; opacity: 1; transform: rotate(-45deg) scaleX(1); }
            80%, 100% { width: 0%; opacity: 0; transform: rotate(-45deg) scaleX(0); }
        }
        
        .animated-slash {
            position: absolute;
            height: 3px;
            background-color: currentColor;
            border-radius: 2px;
            transform-origin: center;
            animation: slashAnim 4s infinite ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .animated-slash {
                height: 5px;
            }
        }

        /* Utilidades para ocultar scrollbar en el selector de idiomas */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Animación de transición de texto */
        .fade-out {
            opacity: 0;
            transform: translateY(10px);
            filter: blur(2px);
        }
    </style>
</head>
<body class="bg-white text-black font-sans flex flex-col min-h-screen items-center justify-center selection:bg-black selection:text-white relative">

    <main class="w-full max-w-3xl mx-auto px-6 text-center flex flex-col items-center justify-center gap-10 md:gap-14 animate-fade-in flex-1">
        
        <!-- Logo DEVON centrado con la línea animada en la O -->
        <div id="devon-text" class="flex items-center justify-center transition-all duration-500">
            <span class="text-6xl md:text-8xl lg:text-[9rem] font-bold tracking-widest text-black font-serif uppercase flex items-center">
                DE<span class="relative inline-flex items-center justify-center">
                    V
                    <a href="https://charlixcx.lnk.to/SS26" target="_blank" rel="noopener noreferrer" class="absolute bottom-full mb-1 md:mb-2 left-1/2 -translate-x-1/2 w-28 md:w-36 lg:w-44 z-10 group overflow-hidden flex items-center justify-center">
                        <!-- Botón rectangular negro que sube desde abajo -->
                        <div class="absolute inset-0 bg-black flex items-center justify-center transition-all duration-500 ease-in-out transform translate-y-full group-hover:translate-y-0 z-20">
                            <span id="ss26-btn-text" class="text-white text-[9px] md:text-[11px] lg:text-xs font-sans tracking-[0.2em] uppercase font-medium whitespace-nowrap transition-opacity duration-300">
                                Escuchar SS26
                            </span>
                        </div>
                        
                        <!-- Imagen principal que desaparece deslizándose hacia arriba -->
                        <img src="https://www.charlixcx.com/sites/g/files/g2000022946/files/2026-05/yhnmdfeolklo.webp" alt="Decoración sobre la V" class="w-full h-auto object-contain transition-all duration-500 ease-in-out transform group-hover:-translate-y-full group-hover:opacity-0 relative z-10">
                    </a>
                </span><span class="relative inline-flex items-center justify-center">O<span class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="animated-slash"></span></span></span>N
            </span>
        </div>

        <!-- Texto de mantenimiento con ID para animación -->
        <div id="text-wrapper" class="flex flex-col items-center gap-4 max-w-lg transition-all duration-500 ease-in-out">
            <h1 id="maint-title" class="text-sm md:text-base font-medium tracking-[0.3em] uppercase text-black" style="font-family: 'Jost', sans-serif;">
                Sitio en mantenimiento
            </h1>
            <div class="w-12 h-[1px] bg-black/20 my-2"></div>
            <p id="maint-body" class="text-xs md:text-sm text-gray-500 tracking-wider leading-relaxed font-light" style="font-family: 'Jost', sans-serif;">
                Estimado lector, lamentamos no poder estar disponibles en este momento. Nos encontramos realizando mejoras para ofrecerle una experiencia excepcional. Por favor, vuelva más tarde.
            </p>
        </div>

    </main>

    <!-- Selector de idiomas (Bottom Footer) -->
    <footer class="w-full absolute bottom-6 md:bottom-10 px-6 flex justify-center z-10">
        <div id="lang-selector" class="flex gap-6 overflow-x-auto no-scrollbar text-[9px] md:text-[10px] font-sans tracking-[0.2em] uppercase max-w-6xl w-full justify-start lg:justify-center px-4 pb-2">
            <!-- Los botones de idioma se generan aquí mediante JavaScript -->
        </div>
    </footer>

    <!-- Script de Traducción y Animación -->
    <script>
        const translations = [
            { code: 'es', label: 'Traducir al Español', dir: 'ltr', title: 'Sitio en mantenimiento', body: 'Estimado lector, lamentamos no poder estar disponibles en este momento. Nos encontramos realizando mejoras para ofrecerle una experiencia excepcional. Por favor, vuelva más tarde.', btnText: 'Escuchar SS26' },
            { code: 'en', label: 'Translate to English', dir: 'ltr', title: 'Site under maintenance', body: 'Dear reader, we regret that we are unavailable at this moment. We are making improvements to offer you an exceptional experience. Please come back later.', btnText: 'Listen to SS26' },
            { code: 'fr', label: 'Traduire en Français', dir: 'ltr', title: 'Site en maintenance', body: 'Cher lecteur, nous regrettons de ne pas être disponibles pour le moment. Nous apportons des améliorations pour vous offrir une expérience exceptionnelle. Veuillez revenir plus tard.', btnText: 'Écouter SS26' },
            { code: 'it', label: 'Traduci in Italiano', dir: 'ltr', title: 'Sito in manutenzione', body: 'Caro lettore, ci dispiace non essere disponibili in questo momento. Stiamo apportando miglioramenti per offrirti un\'esperienza eccezionale. Ti preghiamo di tornare più tardi.', btnText: 'Ascolta SS26' },
            { code: 'pt', label: 'Traduzir para Português', dir: 'ltr', title: 'Site em manutenção', body: 'Caro leitor, lamentamos não estar disponíveis neste momento. Estamos a fazer melhorias para lhe oferecer uma experiência excecional. Por favor, volte mais tarde.', btnText: 'Ouvir SS26' },
            { code: 'de', label: 'Übersetzen auf Deutsch', dir: 'ltr', title: 'Wartungsarbeiten', body: 'Lieber Leser, wir bedauern, dass wir im Moment nicht erreichbar sind. Wir führen Verbesserungen durch, um Ihnen ein außergewöhnliches Erlebnis zu bieten. Bitte kommen Sie später wieder.', btnText: 'SS26 anhören' },
            { code: 'ar', label: 'ترجم إلى العربية', dir: 'rtl', title: 'الموقع تحت الصيانة', body: 'عزيزي القارئ، نأسف لعدم توفرنا في هذا الوقت. نحن نجري تحسينات لنقدم لك تجربة استثنائية. يرجى العودة لاحقاً.', btnText: 'استمع إلى SS26' },
            { code: 'hi', label: 'हिंदी में अनुवाद करें', dir: 'ltr', title: 'साइट रखरखाव में है', body: 'प्रिय पाठक, हमें खेद है कि हम इस समय उपलब्ध नहीं हैं। हम आपको एक असाधारण अनुभव प्रदान करने के लिए सुधार कर रहे हैं। कृपया बाद में वापस आएं।', btnText: 'SS26 सुनें' },
            { code: 'zh', label: '翻译成中文', dir: 'ltr', title: '网站维护中', body: '尊敬的读者，很抱歉我们目前无法提供服务。我们正在进行改进，以提升您的卓越体验。请稍后再来。', btnText: '收听 SS26' },
            { code: 'ja', label: '日本語に翻訳', dir: 'ltr', title: 'メンテナンス中', body: '読者の皆様、現在ご利用いただけず申し訳ありません。素晴らしい体験を提供するために改善を行っています。後ほど再度アクセスしてください。', btnText: 'SS26を聴く' },
            { code: 'ko', label: '한국어로 번역', dir: 'ltr', title: '사이트 유지 보수 중', body: '독자 여러분, 현재 이용할 수 없어 죄송합니다. 특별한 경험을 제공하기 위해 개선 작업을 진행 중입니다. 나중에 다시 방문해 주세요.', btnText: 'SS26 듣기' },
            { code: 'ru', label: 'Перевести на русский', dir: 'ltr', title: 'Сайт на реконструкции', body: 'Уважаемый читатель, к сожалению, в данный момент мы недоступны. Мы вносим улучшения, чтобы предложить вам исключительный опыт. Пожалуйста, зайдите позже.', btnText: 'Слушать SS26' },
            { code: 'tr', label: 'Türkçeye çevir', dir: 'ltr', title: 'Site bakımda', body: 'Değerli okuyucu, şu anda hizmet veremediğimiz için üzgünüz. Size olağanüstü bir deneyim sunmak için iyileştirmeler yapıyoruz. Lütfen daha sonra tekrar gelin.', btnText: 'SS26 Dinle' },
            { code: 'nl', label: 'Vertaal naar Nederlands', dir: 'ltr', title: 'Site in onderhoud', body: 'Beste lezer, het spijt ons dat we op dit moment niet bereikbaar zijn. We voeren verbeteringen uit om u een uitzonderlijke ervaring te bieden. Kom alstublieft later terug.', btnText: 'Luister naar SS26' },
            { code: 'el', label: 'Μετάφραση στα Ελληνικά', dir: 'ltr', title: 'Ιστότοπος υπό συντήρηση', body: 'Αγαπητέ αναγνώστη, λυπούμαστε που δεν είμαστε διαθέσιμοι αυτή τη στιγμή. Πραγματοποιούμε βελτιώσεις για να σας προσφέρουμε μια εξαιρετική εμπειρία. Παρακαλούμε επιστρέψτε αργότερα.', btnText: 'Ακούστε το SS26' }
        ];

        const container = document.getElementById('lang-selector');
        const textWrapper = document.getElementById('text-wrapper');
        const titleEl = document.getElementById('maint-title');
        const bodyEl = document.getElementById('maint-body');
        const btnTextEl = document.getElementById('ss26-btn-text');

        // Generar dinámicamente los botones de idiomas
        translations.forEach(lang => {
            const btn = document.createElement('button');
            btn.className = `lang-btn whitespace-nowrap flex-shrink-0 px-1 py-1 border-b border-transparent transition-all duration-300 ${lang.code === 'es' ? '!text-black !border-black font-semibold' : 'text-gray-400 hover:text-black'}`;
            btn.dataset.lang = lang.code;
            btn.textContent = lang.label;
            
            btn.addEventListener('click', () => {
                if (btn.classList.contains('!text-black')) return; // Evitar click si ya está activo
                
                // 1. Activar animación de ocultamiento y blur
                textWrapper.classList.add('fade-out');
                btnTextEl.style.opacity = '0'; // Ocultar texto del botón
                
                // 2. Esperar al medio de la animación para cambiar el texto
                setTimeout(() => {
                    titleEl.textContent = lang.title;
                    bodyEl.textContent = lang.body;
                    btnTextEl.textContent = lang.btnText;
                    textWrapper.dir = lang.dir; // Soporte RTL para árabe
                    
                    // 3. Remover clase de ocultamiento para que vuelva a aparecer
                    textWrapper.classList.remove('fade-out');
                    btnTextEl.style.opacity = '1'; // Mostrar texto del botón
                    
                    // 4. Actualizar estado visual de los botones
                    document.querySelectorAll('.lang-btn').forEach(b => {
                        b.classList.remove('!text-black', '!border-black', 'font-semibold');
                        b.classList.add('text-gray-400', 'border-transparent');
                    });
                    btn.classList.remove('text-gray-400', 'border-transparent');
                    btn.classList.add('!text-black', '!border-black', 'font-semibold');
                    
                }, 400); // 400ms = Duración de la transición definida en CSS/Tailwind
            });
            
            container.appendChild(btn);
        });
    </script>
</body>
</html>

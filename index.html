<!DOCTYPE html>

<head>

    <!-- Ícono de la pestaña (Favicon) -->
    <link rel="icon" href="https://i.ibb.co/h191t3k2/Devon-Title-logo.png" type="image/png">
    
    <!-- Google Fonts: Preconexión para mayor velocidad de carga -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Jost', 'sans-serif'],
                        serif: ['"Bodoni Moda"', 'serif'],
                        geometric: ['Questrial', 'sans-serif'],
                    },
                    colors: {
                        editorial: {
                            black: '#0a0a0a', 
                            gray: '#888888',
                            lightGray: '#e5e5e5'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        
        /* Animación fluida de la barra en la letra O */
        @keyframes slashAnim {
            0%, 20% { width: 0%; opacity: 0; transform: rotate(-45deg) scaleX(0); }
            30%, 70% { width: 145%; opacity: 1; transform: rotate(-45deg) scaleX(1); }
            80%, 100% { width: 0%; opacity: 0; transform: rotate(-45deg) scaleX(0); }
        }
        
        .animated-slash {
            position: absolute;
            height: 0.04em; 
            background-color: currentColor;
            border-radius: 2px;
            transform-origin: center;
            animation: slashAnim 4s infinite ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Optimizaciones de renderizado para transiciones de texto */
        .fade-transition {
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity;
        }

        /* --- Efecto Liquid Glass (Estilo iOS 26) --- */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.08); /* Súper transparente (antes 0.65) */
            backdrop-filter: blur(45px) saturate(180%); /* Mayor desenfoque */
            -webkit-backdrop-filter: blur(45px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.25); /* Borde más sutil */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        
        /* Sistema Avanzado de la Cápsula (Sin Lag) */
        .capsule-base {
            position: fixed;
            bottom: max(2rem, env(safe-area-inset-bottom));
            left: 50%;
            /* Aceleración por hardware forzada para evitar lag en iOS/Safari */
            transform: translateX(-50%) translateZ(0); 
            backface-visibility: hidden;
            perspective: 1000px;
            
            z-index: 50;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            
            /* Transiciones explícitas ultra suaves */
            transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        height 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        border-radius 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        background-color 0.3s ease;
            will-change: width, height, border-radius;
        }

        /* Estado: Cerrada (Móvil por defecto) */
        .capsule-closed {
            width: 140px;
            height: 40px;
            border-radius: 9999px;
            cursor: pointer;
        }
        .capsule-closed:hover { background: rgba(255, 255, 255, 0.85); }

        /* Estado: Abierta (Móvil por defecto) */
        .capsule-open {
            width: 90vw;
            height: 65vh;
            border-radius: 32px;
            cursor: default;
        }

        /* Media Queries para Tablets/Escritorio */
        @media (min-width: 768px) {
            .capsule-base { bottom: 3rem; }
            .capsule-closed { width: 160px; height: 44px; }
            .capsule-open { width: 700px; height: 60vh; }
        }

        /* Transición del contenido central al abrir la cápsula */
        .central-content-anim {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity, transform, filter;
        }
        
        .content-hidden {
            opacity: 0;
            transform: translateY(-30px) scale(0.97);
            filter: blur(8px);
            pointer-events: none;
        }
        
        .glass-text-shadow {
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
        }
    </style>
</head>

<body class="bg-white text-editorial-black font-sans flex flex-col items-center justify-start min-h-[100dvh] m-0 relative no-scrollbar overflow-hidden">

            hi: { title: "साइट रखरखाव के अधीन है", message: "प्रिय पाठक, हम इस समय अनुपलब्ध होने के लिए क्षमा चाहते हैं। कृपया बाद में वापस आएं, हमारी संपादकीय टीम आपको हाउते कॉउचर के योग्य एक नवीनीकृत अनुभव प्रदान करने के लिए काम कर रही है।", label: "हिंदी में अनुवाद करें" },
            th: { title: "เว็บไซต์อยู่ระหว่างการปรับปรุง", message: "เรียนผู้อ่าน ขออภัยที่เราไม่สามารถให้บริการได้ในขณะนี้ โปรดกลับมาใหม่ในภายหลัง ทีมบรรณาธิการของเรากำลังทำงานเพื่อมอบประสบการณ์ที่ปรับปรุงใหม่ให้คู่ควรกับแฟชั่นชั้นสูง", label: "แปลเป็นภาษาไทย" },
            id: { title: "SITUS DALAM PEMELIHARAAN", message: "Pembaca yang terhormat, kami mohon maaf karena tidak tersedia saat ini. Silakan periksa kembali nanti; tim editorial kami sedang bekerja untuk memberi Anda pengalaman baru yang layak untuk haute couture.", label: "Terjemahkan ke Bahasa Indonesia" },
            vi: { title: "TRANG WEB ĐANG BẢO TRÌ", message: "Kính gửi độc giả, chúng tôi xin lỗi vì không có sẵn tại thời điểm này. Vui lòng quay lại sau, nhóm biên tập của chúng tôi đang làm việc để mang đến cho bạn một trải nghiệm đổi mới xứng đáng với thời trang cao cấp.", label: "Dịch sang Tiếng Việt" },
            zh: { title: "网站维护中", message: "亲爱的读者，对于目前无法访问我们深表歉意。请稍后再试；我们的编辑团队正在努力为您带来全新的、无与伦比的高级时装体验。", label: "翻译成中文" },
            ja: { title: "サイトメンテナンス中", message: "読者の皆様、現在ご利用いただけないことをお詫び申し上げます。後ほど再アクセスしてください。編集チームは、オートクチュールにふさわしい新しい体験を提供するために取り組んでいます。", label: "日本語に翻訳" },
            ko: { title: "사이트 유지보수 중", message: "독자 여러분, 현재 이용할 수 없게 되어 죄송합니다. 나중에 다시 확인해 주세요. 편집팀은 오트쿠튀르에 걸맞은 새로운 경험을 제공하기 위해 노력하고 있습니다.", label: "한국어로 번역" }
        };

        // Palabras para la rotación automática en la cápsula cerrada
        const languageWords = [
            "IDIOMAS", "LANGUAGES", "LANGUES", "LINGUE", "SPRACHEN", "TALEN", 
            "SPRÅK", "SPROG", "KIELET", "JĘZYKI", "JAZYKY", "LIMBI", "ΓΛΩΣΣΕΣ", 
            "DİLLER", "ЯЗЫКИ", "МОВИ", "اللغات", "שפות", "भाषाएं", "ภาษา", 
            "BAHASA", "NGÔN NGỮ", "语言", "言語", "언어"
        ];

        // DOM Elements - Optimización: Caché global para evitar búsquedas repetitivas
        const capsule = document.getElementById('language-capsule');
        const closedView = document.getElementById('capsule-closed-view');
        const expandedView = document.getElementById('capsule-expanded-view');
        const dynamicContent = document.getElementById('central-dynamic-content');
        const overlay = document.getElementById('overlay-click-catcher');
        const languagesGrid = document.getElementById('languages-grid');
        const rotatingText = document.getElementById('current-selected-lang');
        const titleEl = document.getElementById('maintenance-title');
        const messageEl = document.getElementById('maintenance-message');
        const htmlEl = document.documentElement;

        let isCapsuleOpen = false;
        let wordIndex = 0;

        // 1. Renderizar botones de idiomas
        Object.keys(translations).forEach(lang => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'text-left text-[11px] md:text-[12px] font-semibold tracking-[0.1em] text-editorial-gray hover:text-editorial-black transition-colors duration-300 py-1 font-geometric uppercase glass-text-shadow w-full';
            btn.textContent = translations[lang].label;
            btn.onclick = (e) => {
                e.stopPropagation();
                translatePage(lang);
            };
            languagesGrid.appendChild(btn);
        });

        // 2. Animación de "IDIOMAS" rotando en la cápsula
        setInterval(() => {
            if (isCapsuleOpen) return; // Se pausa la rotación si el menú está abierto
            
            // Iniciar Fade Out
            rotatingText.classList.remove('opacity-100');
            rotatingText.classList.add('opacity-0');
            
            setTimeout(() => {
                // Cambiar el texto
                wordIndex = (wordIndex + 1) % languageWords.length;
                rotatingText.textContent = languageWords[wordIndex];
                
                // Iniciar Fade In
                rotatingText.classList.remove('opacity-0');
                rotatingText.classList.add('opacity-100');
            }, 500); // 500ms coincide con duration-500 de Tailwind
        }, 2800); // Cambia cada 2.8 segundos

        // 3. Controladores de la Cápsula (Sin Lag)
        function openLanguageCapsule(e) {
            if (isCapsuleOpen) return;
            if (e) e.stopPropagation();
            
            isCapsuleOpen = true;

            // Expandir Cápsula usando clases CSS precisas
            capsule.classList.remove('capsule-closed');
            capsule.classList.add('capsule-open');

            // Mostrar el overlay
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);

            // Ocultar texto central elevándolo
            dynamicContent.classList.add('content-hidden');

            // Cambiar vista interior
            closedView.classList.remove('opacity-100');
            closedView.classList.add('opacity-0');
            
            setTimeout(() => {
                closedView.classList.add('pointer-events-none');
                expandedView.classList.remove('pointer-events-none');
                expandedView.classList.remove('opacity-0');
                expandedView.classList.add('opacity-100');
            }, 200);
        }

        function closeLanguageCapsule(e) {
            if (!isCapsuleOpen) return;
            if (e) e.stopPropagation();

            isCapsuleOpen = false;

            // Retraer Cápsula
            capsule.classList.remove('capsule-open');
            capsule.classList.add('capsule-closed');

            // Ocultar overlay
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 500);

            // Restaurar texto central
            dynamicContent.classList.remove('content-hidden');

            // Cambiar vista interior
            expandedView.classList.remove('opacity-100');
            expandedView.classList.add('opacity-0');
            expandedView.classList.add('pointer-events-none');

            setTimeout(() => {
                closedView.classList.remove('pointer-events-none');
                closedView.classList.remove('opacity-0');
                closedView.classList.add('opacity-100');
            }, 250);
        }

        // 4. Sistema de Traducción Fluido (Optimizado)
        function translatePage(lang) {
            // Iniciar Fade Out en textos (usando los elementos cacheados)
            titleEl.classList.remove('opacity-100');
            titleEl.classList.add('opacity-0');
            messageEl.classList.remove('opacity-100');
            messageEl.classList.add('opacity-0');

            // Cerrar menú tras elegir
            closeLanguageCapsule();

            setTimeout(() => {
                // Aplicar traducción
                titleEl.textContent = translations[lang].title;
                messageEl.textContent = translations[lang].message;

                htmlEl.lang = lang;
                const textDirection = (lang === 'ar' || lang === 'he') ? 'rtl' : 'ltr';
                titleEl.dir = textDirection;
                messageEl.dir = textDirection;

                // Iniciar Fade In
                titleEl.classList.remove('opacity-0');
                titleEl.classList.add('opacity-100');
                messageEl.classList.remove('opacity-0');
                messageEl.classList.add('opacity-100');
            }, 600);
        }
    </script>
</body>
</html>

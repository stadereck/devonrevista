<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devon México y Latinoamérica | Mantenimiento</title>
    
    <!-- Ícono de la pestaña (Favicon) -->
    <link rel="icon" href="https://i.ibb.co/h191t3k2/Devon-Title-logo.png" type="image/png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Jost', 'sans-serif'],
                        serif: ['"Bodoni Moda"', 'serif'],
                        geometric: ['"Century Gothic"', '"Avant Garde"', 'Questrial', 'sans-serif'],
                    },
                    letterSpacing: {
                        widest: '.2em',
                        wider: '.1em'
                    }
                }
            }
        }
    </script>
    
    <style>
        @keyframes slashAnim {
            0%, 20% { width: 0%; opacity: 0; transform: rotate(-45deg) scaleX(0); }
            30%, 70% { width: 145%; opacity: 1; transform: rotate(-45deg) scaleX(1); }
            80%, 100% { width: 0%; opacity: 0; transform: rotate(-45deg) scaleX(0); }
        }
        
        .animated-slash {
            position: absolute;
            height: 0.04em; 
            background-color: currentColor;
            border-radius: 2px;
            transform-origin: center;
            animation: slashAnim 4s infinite ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        /* Oculta scrollbar para una vista más limpia */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-white text-black font-sans flex flex-col items-center justify-center min-h-screen m-0 overflow-hidden select-none relative">

    <main class="flex flex-col items-center justify-center text-center w-full px-6 z-10 -mt-12">
        
        <!-- Logo animado a gran escala -->
        <h1 class="text-7xl md:text-[8rem] lg:text-[11rem] font-bold tracking-widest text-black font-serif uppercase flex items-center leading-none ml-[0.1em]">
            DEV<span class="relative inline-flex items-center justify-center">O<span class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="animated-slash"></span></span></span>N
        </h1>
        
        <!-- Subtítulo con fuente geométrica (Más pegado arriba) -->
        <div class="text-xs md:text-sm lg:text-[0.95rem] font-semibold tracking-[0.3em] md:tracking-[0.35em] text-black uppercase mt-3 leading-[1.8] text-center font-geometric ml-[0.3em] md:ml-[0.35em]">
            MÉXICO Y<br>LATINOAMÉRICA
        </div>

        <!-- Título de Mantenimiento en Negrita (Más espaciado del logo) -->
        <h2 id="maintenance-title" class="text-[11px] md:text-sm font-bold tracking-[0.2em] md:tracking-[0.3em] text-black uppercase font-geometric mt-16 transition-opacity duration-500">
            SITIO EN MANTENIMIENTO
        </h2>

        <!-- Línea separadora sutil ABAJO del título de mantenimiento -->
        <div class="w-6 md:w-8 h-[1px] bg-gray-300 my-6 md:my-8"></div>

        <!-- Mensaje de Disculpa Editorial -->
        <p id="maintenance-message" class="text-xs md:text-[13px] text-gray-500 max-w-lg mx-auto leading-relaxed font-geometric tracking-wide transition-opacity duration-500 px-4 text-center">
            Estimado lector, lamentamos no estar disponibles en este momento. Vuelva más tarde, nuestro equipo editorial trabaja para ofrecerle una experiencia renovada y digna de la alta costura.
        </p>

    </main>

    <!-- Barra de Traducción Inferior -->
    <footer class="absolute bottom-6 w-full px-4 md:px-12 flex justify-center z-20">
        <div class="flex flex-wrap justify-center gap-x-5 md:gap-x-8 gap-y-3 text-[9px] md:text-[10px] font-semibold tracking-[0.15em] text-gray-400 uppercase font-geometric max-w-6xl">
            <button onclick="translatePage('es')" class="hover:text-black transition-colors duration-300 tracking-wider">Traducir al Español</button>
            <button onclick="translatePage('en')" class="hover:text-black transition-colors duration-300 tracking-wider">Translate to English</button>
            <button onclick="translatePage('fr')" class="hover:text-black transition-colors duration-300 tracking-wider">Traduire en Français</button>
            <button onclick="translatePage('it')" class="hover:text-black transition-colors duration-300 tracking-wider">Traduci in Italiano</button>
            <button onclick="translatePage('pt')" class="hover:text-black transition-colors duration-300 tracking-wider">Traduzir para Português</button>
            <button onclick="translatePage('de')" class="hover:text-black transition-colors duration-300 tracking-wider">Übersetzen auf Deutsch</button>
            <button onclick="translatePage('ar')" class="hover:text-black transition-colors duration-300 tracking-wider">ترجم إلى العربية</button>
            <button onclick="translatePage('hi')" class="hover:text-black transition-colors duration-300 tracking-wider">हिंदी में अनुवाद करें</button>
            <button onclick="translatePage('zh')" class="hover:text-black transition-colors duration-300 tracking-wider">翻译成中文</button>
            <button onclick="translatePage('ja')" class="hover:text-black transition-colors duration-300 tracking-wider">日本語に翻訳</button>
            <button onclick="translatePage('ko')" class="hover:text-black transition-colors duration-300 tracking-wider">한국어로 번역</button>
            <button onclick="translatePage('ru')" class="hover:text-black transition-colors duration-300 tracking-wider">Перевести на русский</button>
        </div>
    </footer>

    <!-- Script para traducciones animadas -->
    <script>
        const translations = {
            es: {
                title: "SITIO EN MANTENIMIENTO",
                message: "Estimado lector, lamentamos no estar disponibles en este momento. Vuelva más tarde, nuestro equipo editorial trabaja para ofrecerle una experiencia renovada y digna de la alta costura."
            },
            en: {
                title: "SITE UNDER MAINTENANCE",
                message: "Dear reader, we apologize for being unavailable at this time. Please check back later; our editorial team is working to bring you a renewed experience worthy of haute couture."
            },
            fr: {
                title: "SITE EN MAINTENANCE",
                message: "Cher lecteur, nous nous excusons d'être indisponibles pour le moment. Revenez plus tard, notre équipe éditoriale travaille pour vous offrir une expérience renouvelée digne de la haute couture."
            },
            it: {
                title: "SITO IN MANUTENZIONE",
                message: "Caro lettore, ci scusiamo per non essere disponibili in questo momento. Torna più tardi, il nostro team editoriale sta lavorando per offrirti un'esperienza rinnovata degna dell'alta moda."
            },
            pt: {
                title: "SITE EM MANUTENÇÃO",
                message: "Caro leitor, pedimos desculpas por estarmos indisponíveis no momento. Volte mais tarde, nossa equipe editorial está trabalhando para lhe oferecer uma experiência renovada e digna da alta-costura."
            },
            de: {
                title: "WEBSITE WIRD GEWARTET",
                message: "Lieber Leser, wir entschuldigen uns, dass wir derzeit nicht erreichbar sind. Bitte versuchen Sie es später erneut; unser Redaktionsteam arbeitet daran, Ihnen ein erneuertes Haute-Couture-Erlebnis zu bieten."
            },
            ar: {
                title: "الموقع تحت الصيانة",
                message: "عزيزي القارئ، نعتذر عن عدم توفرنا في هذا الوقت. يرجى العودة لاحقًا، يعمل فريق التحرير لدينا لتقديم تجربة متجددة تليق بالأزياء الراقية."
            },
            hi: {
                title: "साइट रखरखाव के अधीन है",
                message: "प्रिय पाठक, हम इस समय अनुपलब्ध होने के लिए क्षमा चाहते हैं। कृपया बाद में वापस आएं, हमारी संपादकीय टीम आपको हाउते कॉउचर के योग्य एक नवीनीकृत अनुभव प्रदान करने के लिए काम कर रही है।"
            },
            zh: {
                title: "网站维护中",
                message: "亲爱的读者，对于目前无法访问我们深表歉意。请稍后再试；我们的编辑团队正在努力为您带来全新的、无与伦比的高级时装体验。"
            },
            ja: {
                title: "サイトメンテナンス中",
                message: "読者の皆様、現在ご利用いただけないことをお詫び申し上げます。後ほど再アクセスしてください。編集チームは、オートクチュールにふさわしい新しい体験を提供するために取り組んでいます。"
            },
            ko: {
                title: "사이트 유지보수 중",
                message: "독자 여러분, 현재 이용할 수 없게 되어 죄송합니다. 나중에 다시 확인해 주세요. 편집팀은 오트쿠튀르에 걸맞은 새로운 경험을 제공하기 위해 노력하고 있습니다."
            },
            ru: {
                title: "САЙТ НА ОБСЛУЖИВАНИИ",
                message: "Уважаемый читатель, приносим извинения за временную недоступность. Зайдите позже, наша редакция работает над тем, чтобы предложить вам обновленный опыт, достойный высокой моды."
            }
        };

        function translatePage(lang) {
            const titleEl = document.getElementById('maintenance-title');
            const messageEl = document.getElementById('maintenance-message');

            // 1. Fade out suave
            titleEl.style.opacity = '0';
            messageEl.style.opacity = '0';

            // 2. Cambiar texto y Fade in después de que termine la transición de opacidad (500ms)
            setTimeout(() => {
                titleEl.textContent = translations[lang].title;
                messageEl.textContent = translations[lang].message;

                // Forzar el idioma correcto para que los motores de texto (arabe/chino) se adapten bien
                if(lang === 'ar') {
                    titleEl.style.direction = 'rtl';
                    messageEl.style.direction = 'rtl';
                } else {
                    titleEl.style.direction = 'ltr';
                    messageEl.style.direction = 'ltr';
                }

                titleEl.style.opacity = '1';
                messageEl.style.opacity = '1';
            }, 500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Sitio en mantenimiento - Devon México y Latinoamérica">
    <title>Devon México y Latinoamérica | Mantenimiento</title>
    
    <!-- Ícono de la pestaña (Favicon) -->
    <link rel="icon" href="https://i.ibb.co/h191t3k2/Devon-Title-logo.png" type="image/png">
    
    <!-- Google Fonts: Preconexión para mayor velocidad de carga -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Jost', 'sans-serif'],
                        serif: ['"Bodoni Moda"', 'serif'],
                        geometric: ['Questrial', 'sans-serif'],
                    },
                    colors: {
                        editorial: {
                            black: '#0a0a0a', /* Un negro ligeramente más suave para lectura prolongada */
                            gray: '#888888',
                            lightGray: '#e5e5e5'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Animación fluida de la barra en la letra O */
        @keyframes slashAnim {
            0%, 20% { width: 0%; opacity: 0; transform: rotate(-45deg) scaleX(0); }
            30%, 70% { width: 145%; opacity: 1; transform: rotate(-45deg) scaleX(1); }
            80%, 100% { width: 0%; opacity: 0; transform: rotate(-45deg) scaleX(0); }
        }
        
        .animated-slash {
            position: absolute;
            height: 0.04em; 
            background-color: currentColor;
            border-radius: 2px;
            transform-origin: center;
            animation: slashAnim 4s infinite ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        /* Utilidad para ocultar barras de desplazamiento manteniendo funcionalidad */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Optimizaciones de renderizado para transiciones */
        .fade-transition {
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity;
        }

        /* --- Efecto Liquid Glass (Estilo iOS 26) --- */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-top: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.04);
        }
        
        /* Soporte para áreas seguras en iPhone (Evita que el texto toque el Home Indicator) */
        .safe-pb {
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }
        
        /* Sombra sutil para darle profundidad al texto sobre el cristal */
        .glass-text-shadow {
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
        }
    </style>
</head>

<!-- Usamos min-h-[100dvh] para mejor adaptabilidad en navegadores móviles (iOS Safari) -->
<body class="bg-white text-editorial-black font-sans flex flex-col items-center justify-center min-h-[100dvh] m-0 relative no-scrollbar">

    <!-- Contenido Central (Logo y Mensaje) -->
    <!-- Se cambió pb-24 a pb-32 para que el texto no quede debajo del footer fijo -->
    <main class="flex flex-col items-center justify-center text-center w-full px-6 z-10 flex-grow pb-32 pt-12">
        
        <!-- Logo animado escalable fluidamente usando clamp() -->
        <h1 class="text-[clamp(4.5rem,14vw,11rem)] font-bold tracking-widest font-serif uppercase flex items-center leading-none ml-[0.1em] select-none" aria-label="DEVON">
            <span aria-hidden="true" class="flex items-center">
                DEV<span class="relative inline-flex items-center justify-center">O<span class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="animated-slash"></span></span></span>N
            </span>
        </h1>
        
        <!-- Subtítulo con fuente geométrica ajustado al logo -->
        <div class="text-[clamp(0.65rem,1.5vw,0.95rem)] font-semibold tracking-[0.35em] uppercase mt-2 md:mt-3 leading-[1.8] text-center font-geometric ml-[0.35em] select-none">
            MÉXICO Y<br>LATINOAMÉRICA
        </div>

        <!-- Título de Mantenimiento -->
        <h2 id="maintenance-title" class="text-xs md:text-sm font-bold tracking-[0.25em] md:tracking-[0.3em] uppercase font-geometric mt-16 md:mt-20 fade-transition opacity-100" aria-live="polite">
            SITIO EN MANTENIMIENTO
        </h2>

        <!-- Línea separadora sutil, color gris elegante -->
        <div class="w-8 h-[1px] bg-editorial-lightGray my-6"></div>

        <!-- Mensaje Editorial Formal -->
        <p id="maintenance-message" class="text-[11px] md:text-[13px] text-editorial-gray max-w-md lg:max-w-lg mx-auto leading-relaxed md:leading-[1.9] font-geometric tracking-[0.05em] fade-transition opacity-100 px-4 text-center">
            Estimado lector, lamentamos no estar disponibles en este momento. Vuelva más tarde, nuestro equipo editorial trabaja para ofrecerle una experiencia renovada y digna de la alta costura.
        </p>

    </main>

    <!-- Barra de Traducción Inferior (Estilo Liquid Glass iOS 26) -->
    <footer class="fixed bottom-0 left-0 w-full z-50 liquid-glass safe-pb">
        <!-- Máscara de desvanecimiento en los bordes para un look premium infinito -->
        <div class="w-full relative" style="mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);">
            
            <!-- Navegación de idiomas con scroll horizontal nativo (Swipe) en lugar de apilarse -->
            <nav class="flex overflow-x-auto no-scrollbar snap-x snap-mandatory items-center gap-x-8 px-10 py-5 md:py-6 text-[10px] md:text-[11px] font-semibold tracking-[0.2em] text-editorial-gray uppercase font-geometric w-full h-full">
                
                <button type="button" onclick="translatePage('es')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">Traducir al Español</button>
                <button type="button" onclick="translatePage('en')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">Translate to English</button>
                <button type="button" onclick="translatePage('fr')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">Traduire en Français</button>
                <button type="button" onclick="translatePage('it')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">Traduci in Italiano</button>
                <button type="button" onclick="translatePage('pt')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">Traduzir para Português</button>
                <button type="button" onclick="translatePage('de')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">Übersetzen auf Deutsch</button>
                <button type="button" onclick="translatePage('ar')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">ترجم إلى العربية</button>
                <button type="button" onclick="translatePage('hi')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">हिंदी में अनुवाद करें</button>
                <button type="button" onclick="translatePage('zh')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">翻译成中文</button>
                <button type="button" onclick="translatePage('ja')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">日本語に翻訳</button>
                <button type="button" onclick="translatePage('ko')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">한국어로 번역</button>
                <button type="button" onclick="translatePage('ru')" class="snap-center shrink-0 hover:text-editorial-black glass-text-shadow transition-colors duration-300 focus:outline-none">Перевести на русский</button>
                
            </nav>
        </div>
    </footer>

    <!-- Script para traducciones animadas y accesibilidad -->
    <script>
        const translations = {
            es: {
                title: "SITIO EN MANTENIMIENTO",
                message: "Estimado lector, lamentamos no estar disponibles en este momento. Vuelva más tarde, nuestro equipo editorial trabaja para ofrecerle una experiencia renovada y digna de la alta costura."
            },
            en: {
                title: "SITE UNDER MAINTENANCE",
                message: "Dear reader, we apologize for being unavailable at this time. Please check back later; our editorial team is working to bring you a renewed experience worthy of haute couture."
            },
            fr: {
                title: "SITE EN MAINTENANCE",
                message: "Cher lecteur, nous nous excusons d'être indisponibles pour le moment. Revenez plus tard, notre équipe éditoriale travaille pour vous offrir une expérience renouvelée digne de la haute couture."
            },
            it: {
                title: "SITO IN MANUTENZIONE",
                message: "Caro lettore, ci scusiamo per non essere disponibili in questo momento. Torna più tardi, il nostro team editoriale sta lavorando per offrirti un'esperienza rinnovata degna dell'alta moda."
            },
            pt: {
                title: "SITE EM MANUTENÇÃO",
                message: "Caro leitor, pedimos desculpas por estarmos indisponíveis no momento. Volte mais tarde, nossa equipe editorial está trabalhando para lhe oferecer uma experiência renovada e digna da alta-costura."
            },
            de: {
                title: "WEBSITE WIRD GEWARTET",
                message: "Lieber Leser, wir entschuldigen uns, dass wir derzeit nicht erreichbar sind. Bitte versuchen Sie es später erneut; unser Redaktionsteam arbeitet daran, Ihnen ein erneuertes Haute-Couture-Erlebnis zu bieten."
            },
            ar: {
                title: "الموقع تحت الصيانة",
                message: "عزيزي القارئ، نعتذر عن عدم توفرنا في هذا الوقت. يرجى العودة لاحقًا، يعمل فريق التحرير لدينا لتقديم تجربة متجددة تليق بالأزياء الراقية."
            },
            hi: {
                title: "साइट रखरखाव के अधीन है",
                message: "प्रिय पाठक, हम इस समय अनुपलब्ध होने के लिए क्षमा चाहते हैं। कृपया बाद में वापस आएं, हमारी संपादकीय टीम आपको हाउते कॉउचर के योग्य एक नवीनीकृत अनुभव प्रदान करने के लिए काम कर रही है।"
            },
            zh: {
                title: "网站维护中",
                message: "亲爱的读者，对于目前无法访问我们深表歉意。请稍后再试；我们的编辑团队正在努力为您带来全新的、无与伦比的高级时装体验。"
            },
            ja: {
                title: "サイトメンテナンス中",
                message: "読者の皆様、現在ご利用いただけないことをお詫び申し上げます。後ほど再アクセスしてください。編集チームは、オートクチュールにふさわしい新しい体験を提供するために取り組んでいます。"
            },
            ko: {
                title: "사이트 유지보수 중",
                message: "독자 여러분, 현재 이용할 수 없게 되어 죄송합니다. 나중에 다시 확인해 주세요. 편집팀은 오트쿠튀르에 걸맞은 새로운 경험을 제공하기 위해 노력하고 있습니다."
            },
            ru: {
                title: "САЙТ НА ОБСЛУЖИВАНИИ",
                message: "Уважаемый читатель, приносим извинения за временную недоступность. Зайдите позже, наша редакция работает над тем, чтобы предложить вам обновленный опыт, достойный высокой моды."
            }
        };

        function translatePage(lang) {
            const titleEl = document.getElementById('maintenance-title');
            const messageEl = document.getElementById('maintenance-message');
            const htmlEl = document.documentElement;

            // 1. Iniciar Fade Out manipulando clases de Tailwind
            titleEl.classList.remove('opacity-100');
            titleEl.classList.add('opacity-0');
            messageEl.classList.remove('opacity-100');
            messageEl.classList.add('opacity-0');

            // 2. Cambiar contenido y Fade In tras 500ms (tiempo de la transición CSS)
            setTimeout(() => {
                // Actualizar Textos
                titleEl.textContent = translations[lang].title;
                messageEl.textContent = translations[lang].message;

                // Actualizar atributo global de idioma para SEO y Accesibilidad
                htmlEl.lang = lang;

                // Soporte RTL (Derecha a Izquierda) para Arabe y Hebreo
                const textDirection = (lang === 'ar') ? 'rtl' : 'ltr';
                titleEl.dir = textDirection;
                messageEl.dir = textDirection;

                // Iniciar Fade In
                titleEl.classList.remove('opacity-0');
                titleEl.classList.add('opacity-100');
                messageEl.classList.remove('opacity-0');
                messageEl.classList.add('opacity-100');
            }, 500);
        }
    </script>
</body>
</html>
